<div class="invoice-page">

  @if (toast) {
    <app-toast
      [type]="toast.type"
      [message]="toast.message"
      (close)="toast = null">
    </app-toast>
  }

  <div class="invoice-card">
    <div class="invoice-card__header">
      <h1 class="invoice-card__title">Cadastrar Nota Fiscal</h1>
      <p class="invoice-card__subtitle">Preencha os dados abaixo para cadastrar uma nova nota fiscal.</p>
    </div>

    <form
      class="invoice-form"
      [formGroup]="invoiceForm"
      (ngSubmit)="onSubmit()"
      aria-label="Formulário de cadastro de nota fiscal"
    >

      <div class="invoice-form__row">
        <div class="invoice-form__field">
          <label class="invoice-form__label" for="mes_medicao">Mês de medição</label>
          <select
            class="invoice-form__input"
            id="mes_medicao"
            name="mes_medicao"
            formControlName="mes_medicao"
            aria-required="true"
          >
          <option value="" disabled selected>Selecione o mês</option>
          <option value="JANEIRO">Janeiro</option>
          <option value="FEVEREIRO">Feveiro</option>
          <option value="MARCO">Março</option>
          <option value="ABRIL">Abril</option>
          <option value="MAIO">Maio</option>
          <option value="JUNHO">Junho</option>
          <option value="JULHO">Julho</option>
          <option value="AGOSTO">Agosto</option>
          <option value="SETEMBRO">Setembro</option>
          <option value="OUTUBRO">Outubro</option>
          <option value="NOVEMBRO">Novembro</option>
          <option value="DEZEMBRO">Dezembro</option>
        </select>
        </div>

        <div class="invoice-form__field">
          <label class="invoice-form__label" for="data_vencimento">Data de Vencimento</label>
          <input
            class="invoice-form__input invoice-form__input--date"
            type="date"
            id="data_vencimento"
            name="data_vencimento"
            aria-required="true"
            formControlName="data_vencimento"
          />
        </div>
      </div>

      <div class="invoice-form__field">
        <label class="invoice-form__label" for="arquivo_url">Anexar Documento</label>

        <input
          type="file"
          id="arquivo_url"
          #arquivo_url
          name="arquivo_url"
          accept="application/pdf"
          style="display: none;"
          (change)="onFileSelected($event)"
        />

        <button
          type="button"
          class="invoice-form__upload"
          (click)="triggerFileInput()"
        >
          <mat-icon class="invoice-form__upload-icon">cloud_upload</mat-icon>

          <span class="invoice-form__upload-text">
            {{ selectedFile ? selectedFile.name : 'Clique para anexar' }}
          </span>

          <span class="invoice-form__upload-hint">Apenas arquivos .pdf</span>
        </button>
      </div>

      <button class="invoice-form__submit" type="submit">
        {{ isSending ? 'Processando...' : 'Cadastrar Nota Fiscal' }}
      </button>
    </form>
  </div>
</div>
