<div class="invoice-page">
  <div class="invoice-card">
    <div class="invoice-card__header">
      <h1 class="invoice-card__title">Cadastrar Nota Fiscal</h1>
      <p class="invoice-card__subtitle">Preencha os dados abaixo para cadastrar uma nova nota fiscal.</p>
    </div>

    <form class="invoice-form" [formGroup]="invoiceForm" (ngSubmit)="onSubmit()">
      <div class="invoice-form__field">
        <label class="invoice-form__label" for="numero_nota">Número da Nota</label>
        <input class="invoice-form__input" id="numero_nota" formControlName="numero_nota" type="text" placeholder="e.g. INV-2026-001" />
      </div>

      <div class="invoice-form__row">
        <div class="invoice-form__field">
          <label class="invoice-form__label" for="data_emissao">Data de Emissão</label>
          <input class="invoice-form__input invoice-form__input--date" id="data_emissao" formControlName="data_emissao" type="date" />
        </div>

        <div class="invoice-form__field">
          <label class="invoice-form__label" for="data_vencimento">Data de Vencimento</label>
          <input class="invoice-form__input invoice-form__input--date" id="data_vencimento" formControlName="data_vencimento" type="date" />
        </div>
      </div>

      <div class="invoice-form__field">
        <label class="invoice-form__label" for="valor">Valor (R$)</label>
        <div class="invoice-form__input-wrapper">
          <span class="invoice-form__input-prefix">R$</span>
          <input class="invoice-form__input invoice-form__input--currency" id="valor" formControlName="valor" type="text" placeholder="0,00" />
        </div>
      </div>

      <div class="invoice-form__field">
        <label class="invoice-form__label">Anexo</label>

        <input
        type="file"
        #fileInput
        (change)="onFileSelected($event)"
        accept="application/pdf"
        style="display: none;"
        >

        <button class="invoice-form__upload" type="button" (click)="triggerFileInput()">
          <mat-icon class="invoice-form__upload-icon">cloud_upload</mat-icon>
          <span class="invoice-form__upload-text">
            {{ selectedFile ? selectedFile.name : 'Clique para anexar' }}
          </span>
          <span class="invoice-form__upload-hint">Apenas arquivos .pdf</span>
        </button>
      </div>

      <button class="invoice-form__submit" type="submit">
        Cadastrar Nota Fiscal
      </button>
    </form>
  </div>
</div>
