<app-dynamic-list [config]="listConfig" [items]="items" [isSearching]="isSearching">

  <ng-template #cardBody let-item>
    <div class="body">

      <div class="group group--body">
        <div class="group group--icon">
          <mat-icon class="icon icon--small icon--orange">calendar_today</mat-icon>
        </div>
        <div>
          <h3 class="title title--light">ADMISSÃO</h3>
          <h3 class="title title--dark">{{ item.admissao }}</h3>
        </div>
      </div>

      <div class="group group--body">
        <div class="group group--icon">
          <mat-icon class="icon icon--small icon--orange">calendar_today</mat-icon>
        </div>
        <div>
          <h3 class="title title--light">1º PERÍODO</h3>
          <h3 class="title title--dark">{{ item.primeiro_periodo }}</h3>
        </div>
      </div>

      <div class="group group--body">
        <div class="group group--icon">
          <mat-icon class="icon icon--small icon--orange">calendar_today</mat-icon>
        </div>
        <div>
          <h3 class="title title--light">2º PERÍODO</h3>
          <h3 class="title title--dark">{{ item.segundo_periodo }}</h3>
        </div>
      </div>
    </div>
  </ng-template>

</app-dynamic-list>
