<app-dynamic-list [config]="listConfig" [items]="items" [isSearching]="isSearching">

  <ng-template #cardBody let-item>
    <div class="body">

      <div class="group group--body">
        <div class="group group--icon">
          <mat-icon class="icon icon--small icon--orange">person</mat-icon>
        </div>
        <div>
          <h3 class="title title--light">SOLICITANTE</h3>
          <h3 class="title title--dark">{{ item.criado_por }}</h3>
        </div>
      </div>

      <div class="group group--body">
        <div class="group group--icon">
          <mat-icon class="icon icon--small icon--orange">calendar_today</mat-icon>
        </div>
        <div>
          <h3 class="title title--light">DATA DO OCORRIDO</h3>
          <h3 class="title title--dark">{{ formateDate(item.data_ocorrido) }}</h3>
        </div>
      </div>

      <div class="group group--body">
        <div class="group group--icon">
          <mat-icon class="icon icon--small icon--orange">category</mat-icon>
        </div>
        <div>
          <h3 class="title title--light">TIPO DE ADVERTÊNCIA</h3>
          <h3 class="title title--dark">{{ item.advertencia || 'N/A' }}</h3>
        </div>
      </div>

      <div class="group group--body group--full">
        <div class="group group--icon">
          <mat-icon class="icon icon--small icon--orange">article</mat-icon>
        </div>
        <div>
          <h3 class="title title--light">MOTIVO</h3>
          <h3 class="title title--dark">{{ item.motivo }}</h3>
        </div>
      </div>

      @if (item.observacao) {
      <div class="group group--body group--full">
        <div class="group group--icon">
          <mat-icon class="icon icon--small icon--orange">notes</mat-icon>
        </div>
        <div>
          <h3 class="title title--light">OBSERVAÇÃO</h3>
          <h3 class="title title--dark">{{ item.observacao }}</h3>
        </div>
      </div>
      }

    </div>
  </ng-template>

</app-dynamic-list>
